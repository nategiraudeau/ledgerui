name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag (leave empty to auto: prerelease → alpha, else latest)"
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          OVERRIDE_TAG="${{ inputs.dist_tag }}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${OVERRIDE_TAG}" ]; then
            DIST_TAG="${OVERRIDE_TAG}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            if printf '%s' "${VERSION}" | grep -q '-'; then
              DIST_TAG="alpha"
            else
              DIST_TAG="latest"
            fi
          fi
          if [ "${DIST_TAG}" = "latest" ]; then
            npm publish --access public
          else
            npm publish --access public --tag "${DIST_TAG}"
          fi
