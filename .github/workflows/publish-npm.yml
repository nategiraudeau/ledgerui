name: Publish to npm

# Trusted publishing (OIDC): configure this exact filename on npmjs.com → package → Access → Trusted Publisher.
# Requires GitHub-hosted runners (not self-hosted). No NPM_TOKEN secret.

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag (leave empty to auto: prerelease → alpha, else latest)"
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm trusted publishing / OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node >= 22.14 (npm docs).
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Trusted publishing requires npm CLI >= 11.5.1 (npm docs).
      - name: Upgrade npm for OIDC / trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Publish package
        run: |
          set -euo pipefail
          OVERRIDE_TAG="${{ inputs.dist_tag }}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${OVERRIDE_TAG}" ]; then
            DIST_TAG="${OVERRIDE_TAG}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            if printf '%s' "${VERSION}" | grep -q '-'; then
              DIST_TAG="alpha"
            else
              DIST_TAG="latest"
            fi
          fi
          if [ "${DIST_TAG}" = "latest" ]; then
            npm publish --access public
          else
            npm publish --access public --tag "${DIST_TAG}"
          fi
